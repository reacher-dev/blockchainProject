<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pico W Noise Monitor</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
      background: #f5f7f8;
      color: #182026;
    }

    body {
      margin: 0;
      padding: 24px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
    }

    #status {
      font-size: 14px;
      color: #52606d;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      background: #ffffff;
      border: 1px solid #d9e2e7;
      border-radius: 8px;
      padding: 12px;
    }

    .metric span {
      display: block;
      color: #60707c;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 28px;
      line-height: 1;
    }

    .chart-wrap {
      background: #ffffff;
      border: 1px solid #d9e2e7;
      border-radius: 8px;
      padding: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 420px;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      header {
        display: block;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Pico W Noise Monitor</h1>
      <div id="status">Waiting for backend...</div>
    </header>

    <section class="metrics">
      <div class="metric"><span>Estimated dB</span><strong id="db">--</strong></div>
      <div class="metric"><span>Noise Level</span><strong id="level">--</strong></div>
      <div class="metric"><span>Raw Peak I2S</span><strong id="raw">--</strong></div>
      <div class="metric"><span>Source</span><strong id="source">--</strong></div>
    </section>

    <section class="chart-wrap">
      <canvas id="chart" width="1000" height="420"></canvas>
    </section>
  </main>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const maxPoints = 180;
    const points = [];

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const dbEl = document.getElementById("db");
    const levelEl = document.getElementById("level");
    const rawEl = document.getElementById("raw");
    const sourceEl = document.getElementById("source");

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * scale);
      canvas.height = Math.floor(rect.height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      draw();
    }

    function drawGrid(width, height) {
      ctx.strokeStyle = "#e6edf1";
      ctx.lineWidth = 1;
      ctx.font = "12px Arial";
      ctx.fillStyle = "#60707c";

      for (let db = 30; db <= 110; db += 10) {
        const y = height - ((db - 30) / 80) * height;
        ctx.beginPath();
        ctx.moveTo(42, y);
        ctx.lineTo(width, y);
        ctx.stroke();
        ctx.fillText(String(db), 8, y + 4);
      }
    }

    function drawLine(width, height, key, color) {
      if (points.length < 2) return;

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();

      points.forEach((point, index) => {
        const x = 42 + (index / (maxPoints - 1)) * (width - 48);
        const value = Math.max(30, Math.min(110, point[key] ?? 30));
        const y = height - ((value - 30) / 80) * height;

        if (index === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });

      ctx.stroke();
    }

    function drawNoiseLevel(width, height) {
      if (points.length < 2) return;

      ctx.strokeStyle = "#b45309";
      ctx.lineWidth = 2;
      ctx.beginPath();

      points.forEach((point, index) => {
        const x = 42 + (index / (maxPoints - 1)) * (width - 48);
        const value = 30 + Math.max(0, Math.min(100, point.noiseLevel ?? 0)) * 0.8;
        const y = height - ((value - 30) / 80) * height;

        if (index === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });

      ctx.stroke();
    }

    function draw() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;

      ctx.clearRect(0, 0, width, height);
      drawGrid(width, height - 24);
      drawLine(width, height - 24, "estimatedDb", "#166534");
      drawLine(width, height - 24, "decibels", "#1d4ed8");
      drawNoiseLevel(width, height - 24);

      ctx.fillStyle = "#166534";
      ctx.fillText("estimatedDb", 52, height - 6);
      ctx.fillStyle = "#1d4ed8";
      ctx.fillText("decibels", 150, height - 6);
      ctx.fillStyle = "#b45309";
      ctx.fillText("noiseLevel", 220, height - 6);
    }

    async function refresh() {
      try {
        const response = await fetch(`${API_BASE}/noise/latest`, { cache: "no-store" });
        const payload = await response.json();
        const data = payload.data;

        if (!data) {
          statusEl.textContent = "No data yet";
          return;
        }

        const point = {
          timestamp: data.receivedAt || Date.now() / 1000,
          decibels: data.decibels,
          estimatedDb: data.estimatedDb ?? data.decibels,
          noiseLevel: data.noiseLevel,
          rawPeakI2s: data.rawPeakI2s,
          source: data.source,
        };

        const last = points[points.length - 1];
        if (!last || last.timestamp !== point.timestamp) {
          points.push(point);
          while (points.length > maxPoints) points.shift();
        }

        dbEl.textContent = point.estimatedDb ?? "--";
        levelEl.textContent = point.noiseLevel ?? "--";
        rawEl.textContent = point.rawPeakI2s ?? "--";
        sourceEl.textContent = point.source || "--";
        statusEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
        draw();
      } catch (error) {
        statusEl.textContent = `Backend unavailable: ${error.message}`;
      }
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    refresh();
    setInterval(refresh, 100);
  </script>
</body>
</html>
